<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeLab — Access</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-dark: #0a0a0f;
      --bg-panel: #0d0d14;
      --bg-panel-border: #1a1a2e;
      --text-primary: #e0e0f0;
      --text-dim: #6a6a8a;
      --text-muted: #3a3a5a;
      --neon-cyan: #00f0ff;
      --neon-cyan-dim: rgba(0, 240, 255, 0.15);
      --neon-red: #ff3366;
      --neon-red-dim: rgba(255, 51, 102, 0.1);
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --font-display: 'Orbitron', sans-serif;
      --glow-cyan: 0 0 10px rgba(0, 240, 255, 0.3), 0 0 30px rgba(0, 240, 255, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-mono);
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .scanline {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0) 0px, rgba(0,0,0,0) 1px,
        rgba(0,0,0,0.03) 1px, rgba(0,0,0,0.03) 2px
      );
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .login-box {
      position: relative;
      z-index: 1;
      width: 380px;
      padding: 2.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--bg-panel-border);
      border-radius: 8px;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      border-radius: 8px 8px 0 0;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 0.5rem;
    }

    .logo-text {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      color: var(--text-primary);
    }

    .logo-text .accent {
      color: var(--neon-cyan);
      text-shadow: var(--glow-cyan);
    }

    .login-subtitle {
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.3em;
      margin-bottom: 2rem;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 1.5rem;
    }

    .field label {
      display: block;
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-bottom: 0.5rem;
    }

    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--bg-panel-border);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 8px rgba(0, 240, 255, 0.15);
    }

    .field input::placeholder {
      color: var(--text-muted);
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      border: 1px solid var(--neon-cyan);
      border-radius: 4px;
      background: transparent;
      color: var(--neon-cyan);
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }

    .btn-login:hover {
      background: var(--neon-cyan-dim);
      box-shadow: var(--glow-cyan);
    }

    .btn-login:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .error-msg {
      margin-top: 1rem;
      padding: 0.6rem 0.8rem;
      font-size: 0.75rem;
      color: var(--neon-red);
      border: 1px solid var(--neon-red);
      border-radius: 4px;
      background: var(--neon-red-dim);
      text-align: center;
      display: none;
    }

    .error-msg.visible {
      display: block;
    }

    .footer-text {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="scanline"></div>
  <div class="bg-grid"></div>

  <div class="login-box">
    <div class="logo-area">
      <svg viewBox="0 0 40 40" width="36" height="36">
        <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" fill="none" stroke="var(--neon-cyan)" stroke-width="1.5"/>
        <polygon points="20,8 32,14 32,26 20,32 8,26 8,14" fill="none" stroke="var(--neon-cyan)" stroke-width="0.8" opacity="0.5"/>
        <circle cx="20" cy="20" r="4" fill="var(--neon-cyan)" opacity="0.8"/>
        <line x1="20" y1="16" x2="20" y2="8" stroke="var(--neon-cyan)" stroke-width="0.8" opacity="0.6"/>
        <line x1="23.5" y1="22" x2="32" y2="26" stroke="var(--neon-cyan)" stroke-width="0.8" opacity="0.6"/>
        <line x1="16.5" y1="22" x2="8" y2="26" stroke="var(--neon-cyan)" stroke-width="0.8" opacity="0.6"/>
      </svg>
      <span class="logo-text">TRADE<span class="accent">LAB</span></span>
    </div>
    <div class="login-subtitle">Secure Access Required</div>

    <form id="loginForm">
      <div class="field">
        <label for="password">PASSWORD</label>
        <input type="password" id="password" name="password" placeholder="Enter access code" autocomplete="current-password" autofocus />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">AUTHENTICATE</button>
      <div class="error-msg" id="errorMsg">Access denied — incorrect password</div>
    </form>

    <div class="footer-text">Encrypted session &middot; Auto-expires after 7 days</div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    const input = document.getElementById('password');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'VERIFYING...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: input.value }),
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = '/';
        } else {
          err.classList.add('visible');
          input.value = '';
          input.focus();
        }
      } catch {
        err.textContent = 'Connection failed — try again';
        err.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = 'AUTHENTICATE';
      }
    });
  </script>
</body>
</html>
